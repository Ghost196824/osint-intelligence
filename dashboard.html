<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Centro de Inteligencia</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header>
  <h1>🛡️ CENTRO DE INTELIGENCIA DIGITAL</h1>
  <span>Unidad OSINT</span>
</header>

<div class="container">

  <!-- IZQUIERDA -->
  <aside class="sidebar">
    <h3>🔎 BUSCADOR</h3>

    <input id="input" placeholder="Usuario / Email / Teléfono">
    <button onclick="buscar()">ANALIZAR</button>

    <hr>

    <h3>📂 CASO</h3>
    <div id="caso">Sin analizar</div>
  </aside>

  <!-- CENTRO -->
  <main class="main">

    <div class="panel big">
      <h3>🕸️ RED DE RELACIONES</h3>
      <div id="network"></div>
    </div>

    <div class="panel">
      <h3>⏱️ ACTIVIDAD</h3>
      <div id="timeline"></div>
    </div>

  </main>

  <!-- DERECHA -->
  <aside class="right">

    <div class="panel">
      <h3>🚨 ALERTAS</h3>
      <div id="alertas"></div>
    </div>

    <div class="panel">
      <h3>👤 PERFIL</h3>
      <div id="perfil"></div>
    </div>

    <div class="panel">
      <h3>🧠 IA</h3>
      <div id="ia"></div>
    </div>

    <button class="btn-report" onclick="generarInforme()">
      📄 GENERAR INFORME
    </button>

  </aside>

</div>

<script src="js/app.js"></script>
</body>
</html>
